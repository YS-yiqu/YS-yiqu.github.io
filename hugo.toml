baseURL = "https://ys-yiqu.github.io/"
title = "WenYichao's Blog"
locale = "zh-cn"
defaultContentLanguage = "zh-cn"
hasCJKLanguage = true
enableEmoji = true
enableRobotsTXT = true
theme = "PaperMod"

paginate = 30

[params]
  env = "production"
  description = "🌱 这里记录了一个普通人的学习和踩坑历程。从零开始，慢慢积累，每篇文章都是成长路上的一块砖。不追求完美，只追求进步。希望我的记录能帮到你，哪怕只有一点点。"
  author = "文羿超"
  keywords = ["Blog", "技术博客"]

  # 首页 profile 模式
  profileMode.enabled = true
  profileMode.title = "WenYichao's Blog"
  profileMode.subtitle = "🌱 从零开始的成长记录"
  profileMode.imageUrl = "/img/favicon.svg"
  profileMode.imageTitle = "WY"
  profileMode.buttons.0.name = "GitHub"
  profileMode.buttons.0.url = "https://github.com/YS-yiqu"

  dateFormat = "2006-01-02"

  ShowReadingTime = false
  ShowWordCount = false
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = false
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = false
  UseHugoToc = true
  disableSpecial1stPost = true
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = true
  showtoc = true
  tocopen = true

  [params.socialIcons]
    0 = { name = "github", url = "https://github.com/YS-yiqu" }

  [params.cover]
    hiddenInList = true
    hiddenInSingle = true

  [params.label]
    text = "WenYichao's Blog"
    icon = "/img/favicon.svg"
    iconHeight = 28

  [params.assets]
    favicon = "/img/favicon.svg"
    apple_touch_icon = "/img/favicon.svg"
    safari_pinned_tab = "/img/favicon.svg"

  [params.footer]
    hideCopyright = false
    hideCredits = true

[menu]
  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 10

  [[menu.main]]
    identifier = "search"
    name = "搜索"
    url = "/search/"
    weight = 20

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    lineNos = true
    lineNumbersInTable = true
    noClasses = false

  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
