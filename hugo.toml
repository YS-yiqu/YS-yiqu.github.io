baseURL = "https://ys-yiqu.github.io/"
title = "WenYichao's Blog"
theme = "PaperMod"
languageCode = "zh-cn"
defaultContentLanguage = "zh-cn"
hasCJKLanguage = true
enableEmoji = true
enableRobotsTXT = true

paginate = 30

[params]
  env = "production"
  description = "记录成长和学习记录"
  author = "文羿超"
  keywords = ["Blog", "技术博客"]

  # 主页 - jiajunhuang 风格
  homeInfoParams = {
    Title = "文章",
    Content = ""
  }

  socialIcons = [
    { name = "github", url = "https://github.com/YS-yiqu" }
  ]

  dateFormat = "2006-01-02"

  # 极简模式 - 只保留核心
  ShowReadingTime = false
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = false
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = false
  UseHugoToc = true
  disableSpecial1stPost = true
  disableScrollToTop = false
  comments = false
  hidemeta = true
  hideSummary = true
  showtoc = true
  tocopen = false

  cover:
    hiddenInList = true
    hiddenInSingle = true

  label:
    text = "WenYichao's Blog"
    icon = "/img/favicon.svg"
    iconHeight = 28

  assets:
    favicon = "/img/favicon.svg"
    apple_touch_icon = "/img/favicon.svg"
    safari_pinned_tab = "/img/favicon.svg"

  footer:
    hideCopyright = false
    hideCredits = true

menu:
  main:
    - identifier: archives
      name: 归档
      url: /archives/
      weight: 10
    - identifier: tags
      name: 标签
      url: /tags/
      weight: 20
    - identifier: search
      name: 搜索
      url: /search/
      weight: 30

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    lineNos = true
    lineNumbersInTable = true
    noClasses = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
