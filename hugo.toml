baseURL = "https://ys-yiqu.github.io/"
title = "WenYichao's Blog"
languageCode = "zh-cn"
defaultContentLanguage = "zh-cn"
hasCJKLanguage = true
enableEmoji = true
enableRobotsTXT = true
disableHugoGeneratorInject = true

[module]
  [[module.imports]]
    path = "github.com/adityatelange/hugo-PaperMod"

paginate = 10

[params]
  env = "production"
  description = "记录成长和学习记录"
  author = "文羿超"
  keywords = ["Blog", "技术博客"]

  # 主页标题
  homeInfoParams.Title = "WenYichao's Blog"
  homeInfoParams.Content = "记录成长和学习记录"

  dateFormat = "2006-01-02"

  # NexT 风格 - 显示完整文章信息
  ShowReadingTime = true
  ShowWordCount = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false

  [params.socialIcons]
    0 = { name = "github", url = "https://github.com/YS-yiqu" }

  [params.cover]
    hiddenInList = true
    hiddenInSingle = true

  [params.label]
    text = "WenYichao's Blog"
    icon = "/img/favicon.svg"
    iconHeight = 28

  [params.assets]
    favicon = "/img/favicon.svg"
    apple_touch_icon = "/img/favicon.svg"
    safari_pinned_tab = "/img/favicon.svg"

  [params.footer]
    hideCopyright = false
    hideCredits = true

[menu]
  [[menu.main]]
    identifier = "archives"
    name = "归档"
    url = "/archives/"
    weight = 10

  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 20

  [[menu.main]]
    identifier = "search"
    name = "搜索"
    url = "/search/"
    weight = 30

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    lineNos = true
    lineNumbersInTable = true
    noClasses = false

  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
